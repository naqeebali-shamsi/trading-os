version: 1
defaults:
  max_total_risk_pct: 1.0
  max_symbol_risk_pct: 0.5
  max_asset_class_risk_pct: 1.0
  require_fresh_heartbeat_sec: 15
  require_fresh_tick_sec: 30
  allow_trading_without_broker_metadata: false
  readiness:
    instrument_gate: per_asset_class
    chart_gate: enabled_symbols
    default_boot_required: false
  mt5_bridge:
    template_extension: tpl
    template_preferred: trading_os_bridge
    template_candidates:
    - trading_os_bridge
    - trading_os
sessions:
  london:
    timezone: UTC
    days:
    - mon
    - tue
    - wed
    - thu
    - fri
    windows:
    - - 07:00
      - '16:00'
  new_york:
    timezone: UTC
    days:
    - mon
    - tue
    - wed
    - thu
    - fri
    windows:
    - - '12:00'
      - '21:00'
  forex_24_5:
    timezone: UTC
    days:
    - mon
    - tue
    - wed
    - thu
    windows:
    - - '00:00'
      - '23:59'
  forex_24_5_friday:
    timezone: UTC
    days:
    - fri
    windows:
    - - '00:00'
      - '21:59'
  forex_24_5_sunday:
    timezone: UTC
    days:
    - sun
    windows:
    - - '22:00'
      - '23:59'
  crypto_24_7:
    timezone: UTC
    days:
    - mon
    - tue
    - wed
    - thu
    - fri
    - sat
    - sun
    windows:
    - - 00:00
      - '23:59'
asset_classes:
  forex:
    max_class_risk_pct: 1.0
    default_max_spread_pips: 2.0
    allow_weekend_trading: false
    boot_required: true
    default_sessions:
    - forex_24_5
    - forex_24_5_friday
    - forex_24_5_sunday
  forex_exotic:
    max_class_risk_pct: 0.25
    default_max_spread_pips: 30.0
    allow_weekend_trading: false
    boot_required: true
    default_sessions:
    - forex_24_5
    - forex_24_5_friday
    - forex_24_5_sunday
  metal:
    max_class_risk_pct: 0.5
    default_max_spread_points: 50.0
    allow_weekend_trading: false
    boot_required: true
    default_sessions:
    - forex_24_5
    - forex_24_5_friday
    - forex_24_5_sunday
  index_cfd:
    max_class_risk_pct: 0.35
    default_max_spread_points: 30.0
    allow_weekend_trading: false
  crypto_cfd:
    max_class_risk_pct: 0.25
    default_max_spread_points: 200.0
    allow_weekend_trading: true
  energy_cfd:
    max_class_risk_pct: 0.25
    default_max_spread_points: 80.0
    allow_weekend_trading: false
  stock_cfd:
    max_class_risk_pct: 0.25
    default_max_spread_points: 100.0
    allow_weekend_trading: false
    boot_required: false
    # MT5 stock CFD quotes are often ~15m delayed; allow quote age up to 20m.
    require_fresh_tick_sec: 1200
    default_strategies:
    - MA_CROSS_SMA9_21
symbols:
  EURUSD:
    enabled: true
    broker_symbol: EURUSD
    aliases:
    - EURUSDm
    - EURUSD.
    - EURUSD#
    - EURUSD.micro
    - EURUSD.pro
    asset_class: forex
    base_currency: EUR
    quote_currency: USD
    profit_currency: USD
    pip_size: 0.0001
    point_size: auto
    digits: auto
    tick_size: auto
    tick_value: auto
    contract_size: auto
    min_lot: 0.01
    max_lot: 0.01
    lot_step: 0.01
    max_spread_pips: 2.0
    max_slippage_pips: 1.0
    min_stop_distance_pips: auto
    max_risk_pct: 0.5
    max_open_positions: 1
    allow_long: true
    allow_short: true
    news_sensitivity: high
    strategies:
    - MA_CROSS_SMA9_21
    - RSI_MEAN_REVERSION
  GBPUSD:
