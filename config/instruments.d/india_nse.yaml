# NSE Indian equities — disabled until broker-verified on your MT5 account.
# Enable per symbol after: python scripts/verify_instruments.py --asset-class stock_cfd --region IN --live-query
#
# Broker symbols vary by dealer (RELIANCE vs RELIANCE.IN). Aliases cover common variants.

sessions:
  india_nse:
    timezone: UTC
    days: [mon, tue, wed, thu, fri]
    windows:
      - ["03:45", "10:00"]  # NSE cash ~09:15–15:30 IST

symbols:
  RELIANCE:
    enabled: false
    broker_symbol: RELIANCE
    aliases: [RELIANCE.IN, RELIANCE.NS, RIL]
    asset_class: stock_cfd
    region: IN
    exchange: NSE
    quote_currency: INR
    point_size: 0.05
    min_lot: 1.0
    max_lot: 10.0
    lot_step: 1.0
    max_spread_points: 150.0
    max_risk_pct: 0.03
    max_open_positions: 1
    allow_long: true
    allow_short: false
    sessions: [india_nse]
    news_sensitivity: high
    strategies: []
    selection_note: "Long-term fundamental core; avoid crowded AI momentum-only entries."

